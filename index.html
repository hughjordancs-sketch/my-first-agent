<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f4f8;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .container {
      text-align: center;
      padding: 2rem 3rem;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 3rem;
      color: #2d3748;
      letter-spacing: 0.02em;
    }

    p {
      margin-top: 1rem;
      font-size: 1rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World!</h1>
    <p>Welcome to my first webpage.</p>
  </div>
</body>
</html>
