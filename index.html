<!DOCTYPE html>
<!--
  index.html — Hugh Jordan's personal landing page
  A self-contained static page: no external dependencies, no build step.
  Open directly in any modern browser or serve from any static host.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hugh Jordan — building on the web, one line at a time.">
  <meta property="og:title" content="Hugh Jordan">
  <meta property="og:description" content="Building on the web, one line at a time.">
  <meta property="og:type" content="website">
  <title>Hugh Jordan</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0d1117;
      background-image: radial-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 24px 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #e2e8f0;
      padding: 2rem;
      overflow-x: clip;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #3182ce, transparent 70%);
      top: -120px;
      right: -100px;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #805ad5, transparent 70%);
      bottom: -100px;
      left: -80px;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after { animation: none; }
      .card, footer { animation: none; opacity: 1; transform: none; }
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .card {
      text-align: center;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 6vw, 4rem);
      background: #1a2035;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @supports not (backdrop-filter: blur(1px)) {
      .card { background: #1a2035; }
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #63b3ed;
      background: rgba(99, 179, 237, 0.1);
      border: 1px solid rgba(99, 179, 237, 0.3);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #76e4f7;
      margin-bottom: 1rem;
    }

    h1 .plain { color: #f7fafc; }

    h1 .gradient {
      background: linear-gradient(90deg, #63b3ed, #76e4f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #a0aec0;
      line-height: 1.65;
      margin-bottom: 2.25rem;
    }

    .cta {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: linear-gradient(135deg, #3182ce, #2b6cb0);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(49, 130, 206, 0.4);
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(49, 130, 206, 0.55);
    }

    .cta:active {
      transform: translateY(0);
      box-shadow: 0 4px 20px rgba(49, 130, 206, 0.4);
    }

    .cta:focus-visible {
      outline: 2px solid #76e4f7;
      outline-offset: 4px;
    }

    .icon-links {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 8px;
      color: #718096;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-decoration: none;
      transition: color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .icon-link:hover {
      color: #e2e8f0;
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .icon-link:focus-visible {
      outline: 2px solid #76e4f7;
      outline-offset: 4px;
    }

    .icon-link svg {
      width: 1.1rem;
      height: 1.1rem;
      fill: currentColor;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #718096;
      animation: rise 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="badge">First Project</div>
      <h1><span class="plain">Hello, </span><span class="gradient">World.</span></h1>
      <p class="subtitle">Building things on the web, one line at a time. This is where it starts.</p>
      <a href="https://github.com/hughjordancs-sketch/my-first-agent" class="cta">View on GitHub</a>
      <div class="icon-links">
        <a href="https://github.com/hughjordancs-sketch" class="icon-link" aria-label="GitHub profile">

          </svg>
        </a>
      </div>
    </div>
  </main>
  <footer>Made by Hugh Jordan</footer>
</body>
</html>
